apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: elysia-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: podinfo
            namespace: podinfo
            serverSideApply: "true"
            replace: "false"
            wave: "1"
  template:
    metadata:
      name: "elysia-{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave | default "0"}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/sinhaaritro/platform-stack.git
        targetRevision: HEAD
        path: "kubernetes/clusters/elysia/{{.app}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply={{.serverSideApply}}
          - Replace={{.replace}}
        retry:
          limit: 10
          backoff:
            duration: "5s"
            factor: 2
            maxDuration: "3m"
