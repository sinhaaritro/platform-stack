apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hyperion-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: postgresql-14
            namespace: storage
            serverSideApply: "true"
            replace: "false"
            wave: "6"
          - app: postgresql-18
            namespace: storage
            serverSideApply: "true"
            replace: "false"
            wave: "6"
          - app: couchdb
            namespace: storage
            serverSideApply: "true"
            replace: "false"
            wave: "6"
          - app: loki
            namespace: logging
            serverSideApply: "false"
            replace: "false"
            wave: "7"
          - app: authentik
            namespace: security
            serverSideApply: "true"
            replace: "false"
            wave: "7"
          - app: immich
            namespace: personal
            serverSideApply: "true"
            replace: "false"
            wave: "8"
          - app: obsidian
            namespace: personal
            serverSideApply: "true"
            replace: "false"
            wave: "8"
          - app: podinfo
            namespace: podinfo
            serverSideApply: "true"
            replace: "false"
            wave: "8"
  template:
    metadata:
      name: "hyperion-{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave | default "0"}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/sinhaaritro/platform-stack.git
        targetRevision: HEAD
        path: "kubernetes/clusters/hyperion/{{.app}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply={{.serverSideApply}}
          - Replace={{.replace}}
        retry:
          limit: 10
          backoff:
            duration: "5s"
            factor: 2
            maxDuration: "3m"
