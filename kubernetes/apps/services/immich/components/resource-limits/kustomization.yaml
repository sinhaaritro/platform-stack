apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Deployment
      name: immich-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: immich-server
      spec:
        template:
          spec:
            containers:
              - name: server
                resources:
                  limits:
                    cpu: 1000m
                    memory: 1Gi
  - target:
      kind: Deployment
      name: immich-machine-learning
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: immich-machine-learning
      spec:
        template:
          spec:
            containers:
              - name: machine-learning
                resources:
                  limits:
                    cpu: 2000m
                    memory: 4Gi
