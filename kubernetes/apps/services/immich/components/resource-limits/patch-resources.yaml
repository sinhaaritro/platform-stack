apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: personal
spec:
  template:
    spec:
      containers:
        - name: immich-server
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: personal
spec:
  template:
    spec:
      containers:
        - name: immich-machine-learning
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
