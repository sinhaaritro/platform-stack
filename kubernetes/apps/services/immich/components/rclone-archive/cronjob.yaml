apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-library-glacier-sync
spec:
  schedule: "0 0 1 * *" # 1st of every month
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: rclone
              image: rclone/rclone:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Syncing Immich Library to AWS Glacier Deep Archive..."
                  # Uncomment and configure with proper rclone.conf
                  # rclone sync /data/library aws-glacier:my-immich-bucket/library --transfers 4 --checkers 8
              volumeMounts:
                - name: library
                  mountPath: /data
                  subPath: library
          volumes:
            - name: library
              persistentVolumeClaim:
                claimName: immich-library
          restartPolicy: OnFailure
