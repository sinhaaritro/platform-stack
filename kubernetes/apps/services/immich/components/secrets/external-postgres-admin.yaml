apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-admin
  namespace: personal
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: shared-secrets
  target:
    name: postgres-admin
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: storage/postgres-admin
