apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-admin
  namespace: personal
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: shared-secrets
    kind: ClusterSecretStore
  target:
    name: postgres-admin
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: postgres-admin
