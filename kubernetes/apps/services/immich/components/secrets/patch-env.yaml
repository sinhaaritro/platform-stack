apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
spec:
  template:
    spec:
      containers:
        - name: main
          env:
            # Database Configuration
            - name: DB_HOSTNAME
              value: "postgresql-14.storage.svc.cluster.local"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "change-me-please-postgres-password"
            - name: DB_DATABASE_NAME
              value: "immich"
            # Redis Configuration (Shared Storage Redis - Logical DB 1)
            - name: REDIS_HOSTNAME
              value: "redis.storage.svc.cluster.local"
            - name: REDIS_PASSWORD
              value: "change-me-please-redis-password"
            - name: REDIS_DB
              value: "1"
