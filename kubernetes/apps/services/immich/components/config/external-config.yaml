apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: immich-config
  namespace: personal
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: security-secret-store
    kind: ClusterSecretStore
  target:
    name: immich-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      templateFrom:
        - target: Data
          configMap:
            name: immich-config-tpl
            items:
              - key: immich-config.json
                templateAs: Values
  data:
    - secretKey: IMMICH_OAUTH_CLIENT_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: authentik-oauth-immich
        property: IMMICH_OAUTH_CLIENT_ID
    - secretKey: IMMICH_OAUTH_CLIENT_SECRET
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: authentik-oauth-immich
        property: IMMICH_OAUTH_CLIENT_SECRET
