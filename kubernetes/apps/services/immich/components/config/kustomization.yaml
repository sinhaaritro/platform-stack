apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - external-config.yaml

configMapGenerator:
  - name: immich-config-tpl
    files:
      - immich-config.yaml
generatorOptions:
  disableNameSuffixHash: true

patches:
  - path: patch-volume.yaml
    target:
      kind: Deployment
      name: immich-server
