apiVersion: batch/v1
kind: Job
metadata:
  name: immich-init-db
  namespace: personal
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "0"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: init-db
          image: postgres:14-alpine
          command:
            - /bin/sh
            - -c
            - |
              # Check if secrets exist yet. If not, fail the pod to trigger a retry.
              echo "Checking if secrets have been created by the Operators..."
              if [ -z "$ADMIN_PASSWORD" ] ||[ -z "$DB_USER" ] || [ -z "$DB_PASSWORD" ] || [ -z "$DB_NAME" ]; then
                echo "ERROR: Secrets are not ready in the namespace yet."
                echo "ExternalSecrets or SealedSecrets operators are still processing."
                echo "Exiting so Kubernetes can retry this pod..."
                sleep 5
                exit 1
              fi

              PG_HOST="postgresql-14.storage.svc.cluster.local"

              # 1. Wait until PostgreSQL is actually reachable
              echo "Waiting for PostgreSQL at $PG_HOST..."
              until pg_isready -h "$PG_HOST" -U postgres -t 1 > /dev/null 2>&1; do
                echo "  Postgres not ready. Retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."

              # 2. Use the credentials provided by the Secrets (Now guaranteed to exist by ArgoCD)
              export PGPASSWORD=$ADMIN_PASSWORD

              # Create user if it does not exist
              psql -h "$PG_HOST" -U postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 \
                || psql -h "$PG_HOST" -U postgres -c "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASSWORD';"

              # Create database if it does not exist
              psql -h "$PG_HOST" -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1 \
                || psql -h "$PG_HOST" -U postgres -c "CREATE DATABASE \"$DB_NAME\" OWNER \"$DB_USER\";"

              # Apply required extensions as superuser
              psql -h "$PG_HOST" -U postgres -d "$DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS vectors;"
              psql -h "$PG_HOST" -U postgres -d "$DB_NAME" -c "GRANT ALL PRIVILEGES ON SCHEMA vectors TO \"$DB_USER\";"
              psql -h "$PG_HOST" -U postgres -d "$DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS cube;"
              psql -h "$PG_HOST" -U postgres -d "$DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS earthdistance;"
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-admin
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: DB_USERNAME
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: DB_PASSWORD
                  optional: true
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: DB_DATABASE_NAME
                  optional: true
      restartPolicy: OnFailure
  backoffLimit: 20
