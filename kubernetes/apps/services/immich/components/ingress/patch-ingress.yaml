apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich-server
  namespace: personal
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  labels:
    app.kubernetes.io/name: immich
spec:
  ingressClassName: traefik
  rules:
    - host: immich.ruth.example.com
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: immich-server
                port:
                  number: 2283
