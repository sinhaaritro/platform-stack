apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

helmCharts:
  - name: immich
    repo: https://immich-app.github.io/immich-charts
    releaseName: immich
    namespace: personal
    version: 0.10.3
    valuesInline:
      server:
        ingress:
          main:
            enabled: true
            className: "traefik"
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: "0"
            hosts:
              - host: immich.ruth.example.com
                paths:
                  - path: "/"
                    service:
                      identifier: main
                      port: http
