image:
  tag: v1.114.0

controllers:
  main:
    containers:
      main:
        env:
          # Database Configuration (Centralized PostgreSQL-14)
          DB_HOSTNAME: "postgresql-14.infrastructure.svc.cluster.local"
          DB_USERNAME: "postgres"
          DB_PASSWORD: "superadminpassword"
          DB_DATABASE_NAME: "immich"

          # Redis Configuration (Shared Storage Redis - Logical DB 1)
          REDIS_HOSTNAME: "redis.storage.svc.cluster.local"
          REDIS_PASSWORD: "RtnObTwQ80"
          REDIS_DB: "1"

immich:
  metrics:
    enabled: true

  # Machine Learning and temporary upload processing requires local scratch space.
  # The actual massive image data will be stored seamlessly in SeaweedFS S3
  # once configured via the Immich Admin UI.
  persistence:
    library:
      existingClaim: immich-library
