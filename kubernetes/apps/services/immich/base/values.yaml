image:
  tag: v1.114.0

controllers:
  main:
    containers:
      main:
        env:
          # Database Configuration (Centralized PostgreSQL-14)
          DB_HOSTNAME: "postgresql-14.infrastructure.svc.cluster.local"
          DB_USERNAME: "postgres"
          DB_PASSWORD: "superadminpassword"
          DB_DATABASE_NAME: "immich"

          # Redis Configuration (Shared Storage Redis - Logical DB 1)
          REDIS_HOSTNAME: "redis.storage.svc.cluster.local"
          REDIS_PASSWORD: "RtnObTwQ80"
          REDIS_DB: "1"
    initContainers:
      init-storage:
        image:
          repository: busybox
          tag: latest
        command:
          - sh
          - -c
          - |
            if [ -d /data ]; then
              mkdir -p /data/library /data/upload /data/profile /data/thumbs /data/encoded-video /data/backups
              for dir in library upload profile thumbs encoded-video backups; do
                touch "/data/$dir/.immich"
              done
              chown -R 1000:1000 /data
            else
              echo "/data not found, skipping initialization"
            fi
        securityContext:
          runAsUser: 0

immich:
  metrics:
    enabled: true

  # All Immich data stored on Longhorn PVC (immich-library, 50Gi).
  # Velero backup to be configured separately.
  persistence:
    library:
      existingClaim: immich-library

server:
  ingress:
    main:
      enabled: true
      annotations: {}
      hosts: []

defaultPodOptions:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
