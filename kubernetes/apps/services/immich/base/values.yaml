image:
  tag: v1.114.0

env:
  # Database Configuration (Centralized PostgreSQL-14)
  DB_HOSTNAME: "postgresql-14.infrastructure.svc.cluster.local"
  DB_USERNAME: "postgres"
  DB_PASSWORD: "superadminpassword"
  DB_DATABASE_NAME: "immich"

  # Redis Configuration (Shared Storage Redis - Logical DB 1)
  REDIS_HOSTNAME: "redis.storage.svc.cluster.local"
  REDIS_PASSWORD: "change-me-please-redis-password"
  REDIS_DB: "1"

immich:
  metrics:
    enabled: true

  # Machine Learning and temporary upload processing requires local scratch space.
  # The actual massive image data will be stored seamlessly in SeaweedFS S3
  # once configured via the Immich Admin UI.
  persistence:
    library:
      size: 5Gi
      storageClass: longhorn

# Disable built-in subcharts to use our standalone instances instead
postgresql:
  enabled: false

valkey:
  enabled: false

redis:
  enabled: false

server:
  ingress:
    main:
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
      hosts:
        - host: immich.ruth.example.com
          paths:
            - path: "/"
              service:
                name: immich-server
                port: http

machine-learning:
  persistence:
    enabled: true
    size: 5Gi
    storageClass: longhorn
