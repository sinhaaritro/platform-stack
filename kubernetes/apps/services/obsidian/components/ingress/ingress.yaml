apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obsidian
  namespace: personal
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    link.argocd.argoproj.io/external-link: "https://obsidian.ruth.example.com/"
spec:
  rules:
    - host: obsidian.ruth.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obsidian
                port:
                  name: http
  tls:
    - hosts:
        - obsidian.ruth.example.com
