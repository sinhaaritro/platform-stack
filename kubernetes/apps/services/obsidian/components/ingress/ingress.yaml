apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obsidian
  namespace: personal
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    link.argocd.argoproj.io/external-link: "https://obsidian.placeholder.local/"
spec:
  rules:
    - host: obsidian.placeholder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obsidian
                port:
                  name: http
  tls:
    - hosts:
        - obsidian.placeholder.local
      secretName: obsidian-tls
