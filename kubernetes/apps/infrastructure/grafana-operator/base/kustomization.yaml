apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

helmCharts:
  - name: grafana-operator
    repo: https://grafana.github.io/helm-charts
    version: v5.16.0
    releaseName: grafana-operator
    namespace: monitoring
    includeCRDs: true
    valuesFile: values.yaml
