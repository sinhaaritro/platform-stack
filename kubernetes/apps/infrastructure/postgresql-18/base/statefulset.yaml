apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-18
spec:
  serviceName: postgresql-18
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql-18
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql-18
    spec:
      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres:18-vectorchord
          env:
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
          ports:
            - containerPort: 5432
              name: postgresql
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgresql
