apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-ruth-aritrosinha-prod
  namespace: networking
spec:
  secretName: wildcard-ruth-aritrosinha-prod-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.ruth.aritrosinha.dpdns.org"
  dnsNames:
    - "*.ruth.aritrosinha.dpdns.org"
    - "ruth.aritrosinha.dpdns.org"
