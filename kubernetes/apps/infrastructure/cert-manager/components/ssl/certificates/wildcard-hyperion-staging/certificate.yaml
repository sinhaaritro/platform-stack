apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-hyperion-aritrosinha-staging
  namespace: networking
spec:
  secretName: wildcard-hyperion-aritrosinha-staging-tls
  issuerRef:
    name: letsencrypt-staging-aritrosinha
    kind: ClusterIssuer
  dnsNames:
    - "*.hyperion.aritrosinha.dpdns.org"
