apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging-aritrosinha
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sinhaaritro@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-aritrosinha
    solvers:
      - dns01:
          cloudflare:
            email: sinhaaritro@gmail.com
            apiTokenSecretRef:
              name: cloudflare-dns-aritrosinha
              key: api-token
