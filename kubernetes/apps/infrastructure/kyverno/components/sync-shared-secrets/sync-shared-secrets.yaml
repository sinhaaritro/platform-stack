apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sync-shared-secrets
  annotations:
    policies.kyverno.io/title: Sync Shared Secrets Across Namespaces
    policies.kyverno.io/description: >-
      Mirrors Secrets labeled with platform-stack/shared=true from the storage
      namespace into namespaces listed in the platform-stack/mirror-to annotation.
spec:
  admission: true
  background: true
  emitWarning: false
  validationFailureAction: Audit
  rules:
    - name: sync-to-personal
      match:
        any:
          - resources:
              kinds:
                - Secret
              namespaces:
                - storage
              selector:
                matchLabels:
                  platform-stack/shared: "true"
          - resources:
              kinds:
                - Namespace
              names:
                - personal
      context:
        - name: sourceSecret
          apiCall:
            urlPath: "/api/v1/namespaces/storage/secrets/postgres-admin"
        - name: mirrorTo
          variable:
            jmesPath: 'sourceSecret.metadata.annotations."platform-stack/mirror-to" || '''''
      preconditions:
        all:
          - key: "{{ contains(mirrorTo, 'personal') }}"
            operator: Equals
            value: true
      skipBackgroundRequests: true
      generate:
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: "{{ request.object.metadata.name }}"
        namespace: personal
        clone:
          namespace: storage
          name: "{{ request.object.metadata.name }}"

    - name: sync-to-security
      match:
        any:
          - resources:
              kinds:
                - Secret
              namespaces:
                - storage
              selector:
                matchLabels:
                  platform-stack/shared: "true"
          - resources:
              kinds:
                - Namespace
              names:
                - security
      context:
        - name: sourceSecret
          apiCall:
            urlPath: "/api/v1/namespaces/storage/secrets/postgres-admin"
        - name: mirrorTo
          variable:
            jmesPath: 'sourceSecret.metadata.annotations."platform-stack/mirror-to" || '''''
      preconditions:
        all:
          - key: "{{ contains(mirrorTo, 'security') }}"
            operator: Equals
            value: true
      skipBackgroundRequests: true
      generate:
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: "{{ request.object.metadata.name }}"
        namespace: security
        clone:
          namespace: storage
          name: "{{ request.object.metadata.name }}"
