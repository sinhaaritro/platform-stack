apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sync-shared-secrets
  annotations:
    policies.kyverno.io/title: Sync Shared Secrets Across Namespaces
    policies.kyverno.io/description: >-
      Mirrors Secrets labeled with platform-stack/shared=true from the storage
      namespace into namespaces listed in the platform-stack/mirror-to annotation.
spec:
  admission: true
  background: true
  emitWarning: false
  validationFailureAction: Audit
  rules:
    - name: sync-postgres-admin-to-personal
      match:
        any:
          - resources:
              kinds:
                - Secret
              namespaces:
                - storage
              names:
                - postgres-admin
      generate:
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: postgres-admin
        namespace: personal
        clone:
          namespace: storage
          name: postgres-admin

    - name: sync-postgres-admin-to-security
      match:
        any:
          - resources:
              kinds:
                - Secret
              namespaces:
                - storage
              names:
                - postgres-admin
      generate:
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: postgres-admin
        namespace: security
        clone:
          namespace: storage
          name: postgres-admin
