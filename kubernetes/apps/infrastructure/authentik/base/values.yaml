authentik:
  secret_key: "K2w4Yjd2em0rOG5mZzVlMnc5Z3J5cTdxMmR1YTN4ZmI1aTZvOGwKbjk5YzEycjM0dDV5NnU3aThvOQ=="
  error_reporting:
    enabled: true
  postgresql:
    host: "authentik-postgresql"
    user: "file:///postgres-creds/username"
    password: "file:///postgres-creds/password"

  envFrom:
    - secretRef:
        name: authentik
  # Point to standalone Redis
  redis:
    host: "authentik-redis-master"

server:
  envFrom:
    - secretRef:
        name: authentik
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-secrets
        items:
          - key: username
            path: username
          - key: password
            path: password
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
  ingress:
    enabled: true
    hosts:
      - authentik.domain.tld

  # Tune probes to avoid initial 502 errors during Gunicorn startup
  startupProbe:
    initialDelaySeconds: 10
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 10
    failureThreshold: 5

worker:
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-secrets
        items:
          - key: username
            path: username
          - key: password
            path: password
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
  envFrom:
    - secretRef:
        name: authentik

  # Tune probes to wait for PID file creation in /dev/shm
  startupProbe:
    initialDelaySeconds: 10
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 10
    failureThreshold: 5

postgresql:
  enabled: true
  auth:
    existingSecret: authentik-secrets
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: password
