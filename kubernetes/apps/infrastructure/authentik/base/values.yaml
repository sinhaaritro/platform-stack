authentik:
  secret_key: "K2w4Yjd2em0rOG5mZzVlMnc5Z3J5cTdxMmR1YTN4ZmI1aTZvOGwKbjk5YzEycjM0dDV5NnU3aThvOQ=="
  error_reporting:
    enabled: true
  postgresql:
    host: "postgresql-14.storage.svc.cluster.local"
    user: "file:///postgres-creds/username"
    password: "file:///postgres-creds/password"

  envFrom:
    - secretRef:
        name: authentik
  # Point to standalone Redis (FQDN needed as it is in 'storage' ns)
  redis:
    host: "redis.storage.svc.cluster.local"
    # User requested auth block (applies if subchart enabled, or for documentation)
    auth:
      enabled: true
      password: ""
      existingSecret: "redis-secret"
      existingSecretPasswordKey: "password"

  # Email Configuration (Password is loaded from authentik-secrets via envFrom)
  email:
    host: "smtp.example.com"
    port: 587
    username: "user@example.com"
    use_tls: true
    from: "authentik@example.com"

server:
  envFrom:
    - secretRef:
        name: authentik-secrets
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-db-credentials
        items:
          - key: DB_USERNAME
            path: username
          - key: DB_PASSWORD
            path: password
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
  ingress:
    enabled: true
    hosts:
      - authentik.domain.tld

  # Tune probes to avoid initial 502 errors during Gunicorn startup
  startupProbe:
    initialDelaySeconds: 10
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 10
    failureThreshold: 5

worker:
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-db-credentials
        items:
          - key: DB_USERNAME
            path: username
          - key: DB_PASSWORD
            path: password
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
  envFrom:
    - secretRef:
        name: authentik-secrets

  # Tune probes to wait for PID file creation in /dev/shm
  startupProbe:
    initialDelaySeconds: 10
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 10
    failureThreshold: 5

postgresql:
  enabled: false
