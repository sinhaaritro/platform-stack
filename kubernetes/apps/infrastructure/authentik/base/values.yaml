authentik:
  log_level: info
  error_reporting:
    enabled: false

  # Global defaults for security context if supported, otherwise explicit per component below.

server:
  # Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    fsGroup: 1001

  # Container-level security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

worker:
  # Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    fsGroup: 1001

  # Container-level security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # Enable generic secret support (we patch the specific secret name in the component)
  # But the chart needs to know to look for env vars if we don't provide them here.
  # Actually, if we use envFrom, we don't need to change much here, just ensure no conflicting values.

postgresql:
  enabled: true
  auth:
    # We will provide credentials via Secret/Env, but chart might need placeholders?
    # Keeping minimal defaults that we override or satisfy via Secret.
    username: authentik
    database: authentik
    # password  # Secret Key is now provided via envFrom (secrets component)
  envFrom:
    - secretRef:
        name: authentik-secrets

redis:
  enabled: true
  architecture: standalone
