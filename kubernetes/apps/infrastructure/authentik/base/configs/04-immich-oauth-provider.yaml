apiVersion: blueprints.goauthentik.io/v1
kind: Provider
metadata:
  name: "immich-oauth-provider"
spec:
  # This is an OAuth2/OpenID Connect provider
  type: "oauth2"
  # Authorization flow - using the default authorization flow
  authorization_flow: "default-authorization-flow"
  # Redirection URI for the application
  redirect_uris:
    - "https://immich.yourdomain.com/oauth2/callback"
  # Grant types allowed
  grant_types:
    - "authorization_code"
    - "refresh_token"
  # Response types allowed
  response_types:
    - "code"
  # Scopes allowed
  scopes:
    - "openid"
    - "profile"
    - "email"
  # Signing key - will be auto-generated if not specified
  # signing_key: ""
  # Disable user consent for this provider (if you trust the application)
  consent: false
  # PKCE enforcement
  pkce_enforced: false
  # Enable refresh tokens
  refresh_token_rotation: true
  # Access token validity (in seconds)
  access_token_validity: 900
  # Refresh token validity (in seconds)
  refresh_token_validity: 2592000
