apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Deployment
      name: authentik-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: authentik-server
      spec:
        replicas: 0
  - target:
      kind: Deployment
      name: authentik-worker
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: authentik-worker
      spec:
        replicas: 0
