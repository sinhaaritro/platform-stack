apiVersion: v1
kind: Secret
metadata:
  name: authentik-secrets
  namespace: security
  labels:
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: authentik
    app.kubernetes.io/part-of: authentik
    app.kubernetes.io/version: 2025.12.4
type: Opaque
stringData:
  # This key is used for cookie signing and should be unique.
  # In a real setup, this should be sealed or injected via external secrets.
  AUTHENTIK_SECRET_KEY: "change-me-please"
  # Postgres password for the authentik user
  AUTHENTIK_POSTGRESQL__PASSWORD: "change-me-please"
