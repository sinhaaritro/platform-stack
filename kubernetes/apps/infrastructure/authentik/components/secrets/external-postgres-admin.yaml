apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-admin
  namespace: security
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: authentik-storage-secret-store
  target:
    name: postgres-admin
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: postgres-admin
