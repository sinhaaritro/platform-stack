apiVersion: batch/v1
kind: CronJob
metadata:
  name: authentik-db-backup
  labels:
    app.kubernetes.io/name: authentik-db-backup
spec:
  # Run at 01:30 UTC daily, 30 minutes before the Velero schedule runs at 02:00 UTC (07:30 IST)
  # Actually, Velero schedule will run at 20:30 UTC (02:00 IST), so we run this at 20:00 UTC (01:30 IST)
  schedule: "0 20 * * *" 
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: authentik-db-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:18-alpine
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting Authentik DB Backup..."
                  export PGPASSWORD=$DB_PASSWORD
                  pg_dump -h $DB_HOSTNAME -U $DB_USERNAME -d $DB_DATABASE_NAME -f /backup/authentik-db.sql -c -C -O
                  echo "Backup complete."
              env:
                - name: DB_HOSTNAME
                  value: "postgresql-18.storage.svc.cluster.local"
              envFrom:
                - secretRef:
                    name: authentik-db-credentials
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: authentik-db-backup
