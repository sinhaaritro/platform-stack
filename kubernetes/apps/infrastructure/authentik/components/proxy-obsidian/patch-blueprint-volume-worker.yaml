apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
spec:
  template:
    spec:
      containers:
        - name: authentik-worker
          volumeMounts:
            - name: blueprint-obsidian
              mountPath: /blueprints/obsidian-proxy.yaml
              subPath: obsidian-proxy-blueprint.yaml
      volumes:
        - name: blueprint-obsidian
          configMap:
            name: authentik-obsidian-blueprint
