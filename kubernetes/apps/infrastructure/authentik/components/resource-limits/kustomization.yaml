apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/instance=authentik"
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: authentik
      spec:
        template:
          spec:
            containers:
              - name: authentik
                resources:
                  limits:
                    cpu: 500m
                    memory: 1Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
