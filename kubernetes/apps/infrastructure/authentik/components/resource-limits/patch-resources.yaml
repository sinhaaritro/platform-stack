apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: security
spec:
  template:
    spec:
      containers:
        - name: authentik
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: security
spec:
  template:
    spec:
      containers:
        - name: authentik
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
