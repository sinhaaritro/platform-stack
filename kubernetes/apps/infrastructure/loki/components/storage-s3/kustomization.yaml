apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: StatefulSet
      name: loki-read
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki-read
      spec:
        template:
          spec:
            containers:
              - name: read
                env:
                  - name: S3_ENDPOINT
                    value: "http://seaweedfs-s3.storage.svc:8333"
                  - name: S3_REGION
                    value: "us-east-1"
                  - name: S3_BUCKET_CHUNKS
                    value: "loki-chunks"
                  - name: S3_BUCKET_RULER
                    value: "loki-ruler"
                  - name: S3_BUCKET_ADMIN
                    value: "loki-admin"
                  - name: S3_ACCESS_KEY
                    value: "loki"
                  - name: S3_SECRET_KEY
                    value: "loki"
  - target:
      kind: StatefulSet
      name: loki-write
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki-write
      spec:
        template:
          spec:
            containers:
              - name: write
                env:
                  - name: S3_ENDPOINT
                    value: "http://seaweedfs-s3.storage.svc:8333"
                  - name: S3_REGION
                    value: "us-east-1"
                  - name: S3_BUCKET_CHUNKS
                    value: "loki-chunks"
                  - name: S3_BUCKET_RULER
                    value: "loki-ruler"
                  - name: S3_BUCKET_ADMIN
                    value: "loki-admin"
                  - name: S3_ACCESS_KEY
                    value: "loki"
                  - name: S3_SECRET_KEY
                    value: "loki"
  - target:
      kind: StatefulSet
      name: loki-backend
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki-backend
      spec:
        template:
          spec:
            containers:
              - name: backend
                env:
                  - name: S3_ENDPOINT
                    value: "http://seaweedfs-s3.storage.svc:8333"
                  - name: S3_REGION
                    value: "us-east-1"
                  - name: S3_BUCKET_CHUNKS
                    value: "loki-chunks"
                  - name: S3_BUCKET_RULER
                    value: "loki-ruler"
                  - name: S3_BUCKET_ADMIN
                    value: "loki-admin"
                  - name: S3_ACCESS_KEY
                    value: "loki"
                  - name: S3_SECRET_KEY
                    value: "loki"
  - target:
      kind: DaemonSet
      name: loki-canary
    patch: |
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: loki-canary
      spec:
        template:
          spec:
            containers:
              - name: canary
                env:
                  - name: S3_ENDPOINT
                    value: "http://seaweedfs-s3.storage.svc:8333"
                  - name: S3_REGION
                    value: "us-east-1"
                  - name: S3_BUCKET_CHUNKS
                    value: "loki-chunks"
                  - name: S3_BUCKET_RULER
                    value: "loki-ruler"
                  - name: S3_BUCKET_ADMIN
                    value: "loki-admin"
                  - name: S3_ACCESS_KEY
                    value: "loki"
                  - name: S3_SECRET_KEY
                    value: "loki"
