apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: networking
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.ruth.aritrosinha.dpdns.org`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: traefik-dashboard-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-dashboard-cert
  namespace: networking
spec:
  issuerRef:
    name: letsencrypt-prod-aritrosinha
    kind: ClusterIssuer
  secretName: traefik-dashboard-cert
  dnsNames:
    - traefik.ruth.aritrosinha.dpdns.org
  commonName: traefik.ruth.aritrosinha.dpdns.org
