apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-dashboard-cert
  namespace: networking
spec:
  issuerRef:
    name: letsencrypt-prod-aritrosinha
    kind: ClusterIssuer
  secretName: traefik-dashboard-cert
  dnsNames:
    - traefik.ruth.aritrosinha.com
  commonName: traefik.ruth.aritrosinha.com
