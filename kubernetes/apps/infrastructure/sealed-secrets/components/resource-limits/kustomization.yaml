apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Deployment
      name: sealed-secrets
      namespace: security
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: sealed-secrets
      spec:
        template:
          spec:
            containers:
              - name: controller
                resources:
                  limits:
                    cpu: 200m
                    memory: 256Mi
                  requests:
                    cpu: 20m
                    memory: 64Mi
