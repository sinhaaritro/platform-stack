apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: sealed-secrets
    repo: https://bitnami-labs.github.io/sealed-secrets
    version: 2.18.0
    releaseName: sealed-secrets
    namespace: security
    includeCRDs: true
    valuesInline:
      # Disable automatic key rotation. We manage the master key manually
      # via Ansible Vault to ensure sealed secrets survive cluster rebuilds.
      keyrenewperiod: "0"
