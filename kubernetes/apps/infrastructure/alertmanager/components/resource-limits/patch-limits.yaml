apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager
spec:
  template:
    spec:
      containers:
        - name: alertmanager
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
        - name: config-reloader
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 64Mi
