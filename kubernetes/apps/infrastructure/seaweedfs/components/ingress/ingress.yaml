apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seaweedfs-master
  namespace: storage
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-aritrosinha"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - seaweedfs.hyperion.aritrosinha.dpdns.org
      secretName: seaweedfs-master-tls
  rules:
    - host: seaweedfs.hyperion.aritrosinha.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seaweedfs-master
                port:
                  number: 9333
---
