architecture: standalone
auth:
  enabled: true
  existingSecret: redis-secret
  existingSecretPasswordKey: password

# Setting commonConfiguration to empty suppresses Helm's ConfigMap generation.
# Without the ConfigMap, the entrypoint reads the password from $REDIS_PASSWORD
# env var (sourced from redis-secret), making secrets.yaml the single source of truth.
commonConfiguration: ""

primary:
  persistence:
    enabled: false
  # Redis is used as a cache/session store only — no data worth persisting.
  # Disabling AOF and RDB prevents corruption after power loss.
  extraFlags:
    - "--appendonly no"
    - "--save ''"
