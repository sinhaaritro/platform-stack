# ============================================================
# RESTORE TEMPLATE: SSL Certificates — CREATE MODE
# ============================================================
# USE CASE: Level 1 — Namespace accidentally deleted.
#           Level 2 — Full rebuild from new VM.
#
# BEHAVIOR: Only creates missing resources. Skips anything
#           that already exists (e.g., resources ArgoCD has
#           already recreated from Git).
#
# USAGE:
#   1. List available backups:
#      kubectl get backups.velero.io -n backup -l velero.io/schedule-name=daily-ssl-certs
#
#   2. Pick the most recent backup and replace BACKUP_NAME below.
#
#   3. Apply:
#      kubectl apply -f restore-create.yaml
#
#   4. Monitor:
#      kubectl get restore -n backup
#      kubectl describe restore ssl-cert-restore-create -n backup
# ============================================================
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: ssl-cert-restore-create
  namespace: backup
spec:
  backupName: BACKUP_NAME # <-- REPLACE with actual backup name (e.g., daily-ssl-certs-20260424010000)
  includedNamespaces:
    - networking
  existingResourcePolicy: none # Skips resources that already exist
  restorePVs: false # SSL certs are K8s Secrets, no PVCs to restore
