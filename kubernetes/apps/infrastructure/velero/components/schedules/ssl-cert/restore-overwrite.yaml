# ============================================================
# RESTORE TEMPLATE: SSL Certificates — OVERWRITE MODE
# ============================================================
# USE CASE: Level 1 — App corruption, bad secret rotation,
#           or SSL cert overwritten with wrong data.
#
# BEHAVIOR: Overwrites existing resources with backup data.
#
# USAGE:
#   1. List available backups:
#      kubectl get backups.velero.io -n backup -l velero.io/schedule-name=daily-ssl-certs
#
#   2. Pick a known-good backup and replace BACKUP_NAME below.
#
#   3. Apply:
#      kubectl apply -f restore-overwrite.yaml
#
#   4. Monitor:
#      kubectl get restore -n backup
#      kubectl describe restore ssl-cert-restore-overwrite -n backup
# ============================================================
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: ssl-cert-restore-overwrite
  namespace: backup
spec:
  backupName: BACKUP_NAME # <-- REPLACE with actual backup name (e.g., daily-ssl-certs-20260424010000)
  includedNamespaces:
    - networking
  existingResourcePolicy: update # Overwrites existing resources
  restorePVs: false # SSL certs are K8s Secrets, no PVCs to restore
