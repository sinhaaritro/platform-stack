# ============================================================
# RESTORE RUNBOOK: Immich — HYBRID (Rclone Media + Velero DB Dump)
# ============================================================
# USE CASE: Disaster recovery, corruption, or database rollback.
#
# BEHAVIOR: Restores the database dump into a temporary namespace
#           and syncs media library directly via Rclone.
#
# RUNBOOK:
#
#   1. Enable maintenance mode (scales Immich to 0 replicas via Git):
#      In kubernetes/clusters/ruth/immich/kustomization.yaml,
#      uncomment the maintenance component:
#        - ../../../apps/services/immich/components/maintenance
#      Commit and push. Wait for ArgoCD to sync.
#      Verify: kubectl get deploy -n personal -l app.kubernetes.io/instance=immich
#      (READY should show 0/0 for server and machine-learning)
#
#   2. Run Rclone Restore (Media files directly to live PVC):
#      kubectl create job --from=cronjob/immich-rclone-backup immich-rclone-restore -n personal --dry-run=client -o yaml \
#        | sed 's/rclone sync \/data/rclone copy/g; s/aws:aritro-homelab\/nas_backup\/immich/aws:aritro-homelab\/nas_backup\/immich \/data/g' \
#        | kubectl apply -f -
#
#   3. Wait for Rclone completion:
#      kubectl wait --for=condition=complete job/immich-rclone-restore -n personal --timeout=1h
#
#   4. Re-trigger Velero restore (to extract database dump into restore namespace PVC):
#      a) Find latest backup name:
#         kubectl get backups.velero.io -n backup --sort-by=.metadata.creationTimestamp
#      b) Replace BACKUP_NAME in this file (at the bottom)
#      c) Apply this restore file:
#         kubectl apply -f restore.yaml
#      d) Verify completion (Phase: Completed):
#         kubectl get restore immich-restore -n backup
#
#   5. Spin up temporary pod to mount the restored PVC in the restore namespace:
#      cat <<'EOF' | kubectl apply -f -
#      apiVersion: v1
#      kind: Pod
#      metadata:
#        name: restore-temp
#        namespace: restore
#      spec:
#        containers:
#        - name: utils
#          image: busybox
#          command: ["sleep", "3600"]
#          volumeMounts:
#          - name: data
#            mountPath: /data
#        volumes:
#        - name: data
#          persistentVolumeClaim:
#            claimName: immich-library
#      EOF
#
#   6. Import the DB dump directly into Postgres:
#      # a) Terminate existing database connections:
#      kubectl exec -i -n storage postgresql-14-0 -- psql -U postgres -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'immich';"
#      # b) Import database dump (drops, recreates, and populates 'immich' DB):
#      kubectl exec -n restore restore-temp -- cat /data/backups/immich-db.sql | kubectl exec -i -n storage postgresql-14-0 -- psql -U postgres
#
#   7. Disable maintenance mode:
#      In kubernetes/clusters/ruth/immich/kustomization.yaml,
#      re-comment the maintenance component:
#        # - ../../../apps/services/immich/components/maintenance
#      Commit and push. ArgoCD scales Immich back to 1.
#
#   8. Cleanup:
#      kubectl delete pod restore-temp -n restore
#      kubectl delete ns restore
#      kubectl delete restore immich-restore -n backup
#      kubectl delete job immich-rclone-restore -n personal
# ============================================================
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: immich-restore
  namespace: backup
spec:
  backupName: BACKUP_NAME # <-- REPLACE with actual backup name
  includedNamespaces:
    - personal
  includedResources:
    - persistentvolumeclaims
  labelSelector:
    matchLabels:
      app.kubernetes.io/instance: immich
  namespaceMapping:
    personal: restore
  existingResourcePolicy: none
  restorePVs: true
