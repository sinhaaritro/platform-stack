apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-immich
  namespace: backup
spec:
  schedule: "30 20 * * *" # 02:00 AM IST (20:30 UTC)
  template:
    includedNamespaces:
      - personal
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: immich
    storageLocation: aws
    defaultVolumesToFsBackup: true
    ttl: 720h0m0s # 30 days
