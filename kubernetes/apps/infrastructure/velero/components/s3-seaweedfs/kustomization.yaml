apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - secret.yaml

# Configures Velero's BackupStorageLocation for SeaweedFS S3.
# Patches the rendered BSL from the Helm chart.
patches:
  - target:
      kind: BackupStorageLocation
      name: default
    path: patch-bsl.yaml
