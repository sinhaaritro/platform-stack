image:
  repository: docker.io/velero/velero
  tag: v1.18.0
  pullPolicy: IfNotPresent

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.13.1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

upgradeCRDs: true

# # BSL placeholder — patched by s3-seaweedfs component
# configuration:
#   backupStorageLocation:
#     - name: default
#       provider: ""
#       bucket: ""
#       default: true

#   volumeSnapshotLocation: []

# Credentials - explicitly enabled for AWS plugin
credentials:
  useSecret: true
  name: velero-aws-creds
  secretContents: {}

deployNodeAgent: true

# schedules: {}

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: false

rbac:
  create: true

serviceAccount:
  server:
    create: true
