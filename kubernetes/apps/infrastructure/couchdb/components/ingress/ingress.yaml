apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: couchdb
  namespace: storage
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-aritrosinha"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - couchdb.ruth.aritrosinha.dpdns.org
      secretName: couchdb-tls
  rules:
    - host: couchdb.ruth.aritrosinha.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: couchdb-couchdb
                port:
                  number: 5984
