apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: ConfigMap
      name: alloy
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: alloy
      data:
        config.alloy: |
          // Logging: Discovery
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              action = "keep"
              regex = ".*"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label = "node"
            }
          }

          // Logging: Source
          loki.source.kubernetes "pod_logs" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.default.receiver]
          }

          // Logging: Write
          loki.write "default" {
            endpoint {
              url = "http://loki-gateway.logging.svc.cluster.local:80/loki/api/v1/push"
              tenant_id = "1"
            }
          }

          // Metrics: Discovery (Node Exporter)
          discovery.kubernetes "nodes" {
            role = "service"
          }

          discovery.relabel "node_exporter" {
            targets = discovery.kubernetes.nodes.targets
            rule {
              source_labels = ["__meta_kubernetes_service_name"]
              regex = ".*node-exporter.*"
              action = "keep"
            }
          }

          // Metrics: Discovery (SeaweedFS)
          discovery.relabel "seaweedfs" {
            targets = discovery.kubernetes.nodes.targets
            rule {
              source_labels = ["__meta_kubernetes_service_name"]
              regex = "seaweedfs-(master|volume|filer|s3)"
              action = "keep"
            }
            rule {
              target_label = "__address__"
              replacement  = "${1}:9327"
              source_labels = ["__address__"]
              regex = "([^:]+)(?::\\d+)?"
            }
          }

          // Metrics: Scrape
          prometheus.scrape "node_exporter" {
            job_name   = "node-exporter"
            targets    = discovery.relabel.node_exporter.output
            forward_to = [prometheus.remote_write.mimir.receiver]
            scrape_interval = "15s"
          }

          prometheus.scrape "seaweedfs" {
            job_name   = "seaweedfs"
            targets    = discovery.relabel.seaweedfs.output
            forward_to = [prometheus.remote_write.mimir.receiver]
            scrape_interval = "15s"
          }

          // Metrics: Write
          prometheus.remote_write "mimir" {
            endpoint {
              url = "http://mimir-nginx.monitoring.svc.cluster.local:80/api/v1/push"
              headers = {
                "X-Scope-OrgID" = "anonymous",
              }
            }
          }
