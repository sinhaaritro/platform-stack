apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-14
spec:
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "longhorn"
        resources:
          requests:
            storage: 15Gi
        volumeMode: Filesystem
