apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      group: traefik.io
      version: v1alpha1
      kind: IngressRoute
      name: traefik-dashboard
    patch: |-
      - op: replace
        path: /spec/routes/0/match
        value: Host(`traefik.elysia.example.com`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
  - target:
      kind: Certificate
      name: traefik-dashboard-cert
    patch: |-
      - op: replace
        path: /spec/dnsNames/0
        value: traefik.elysia.example.com
      - op: replace
        path: /spec/commonName
        value: traefik.elysia.example.com
  - target:
      kind: IngressRoute
      name: traefik-dashboard
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          link.argocd.argoproj.io/external-link: https://traefik.elysia.example.com/dashboard/
