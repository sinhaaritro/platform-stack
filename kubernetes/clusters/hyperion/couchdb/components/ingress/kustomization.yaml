apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Ingress
      name: couchdb
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: couchdb.hyperion.aritrosinha.dpdns.org
      - op: replace
        path: /spec/tls/0/hosts/0
        value: couchdb.hyperion.aritrosinha.dpdns.org
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod-aritrosinha
