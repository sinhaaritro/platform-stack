            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto"
          },
          "title": "Oldest Successful Backup",
          "type": "stat",
          "targets": [
            {
              "expr": "(time() - max(velero_backup_last_successful_timestamp)) / 3600",
              "legendFormat": "Hours Ago",
