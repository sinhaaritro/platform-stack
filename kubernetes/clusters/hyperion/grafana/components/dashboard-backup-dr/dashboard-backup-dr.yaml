                "lineInterpolation": "linear",
                "barAlignment": 1,
                "lineWidth": 1,
                "fillOpacity": 100,
                "gradientMode": "scheme",
                "spanNulls": false,
                "showPoints": "never",
                "pointSize": 5,
                "stacking": {"mode": "none", "group": "A"}
              },
              "color": {
                "mode": "palette-classic"
