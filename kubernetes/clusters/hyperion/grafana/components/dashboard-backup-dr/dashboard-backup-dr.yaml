            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "Schedule"}, "properties": [{"id": "custom.width", "value": 200}]},
              {"matcher": {"id": "byName", "options": "Last Status"}, "properties": [{"id": "custom.displayMode", "value": "color-text"}, {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 4}]}}]},
              {"matcher": {"id": "byName", "options": "Last Run"}, "properties": [{"id": "custom.width", "value": 150}]}
            ]
