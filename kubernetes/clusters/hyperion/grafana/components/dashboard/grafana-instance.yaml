apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: hyperion
  namespace: monitoring
  labels:
    dashboards: hyperion
spec:
  external:
    url: http://grafana.monitoring.svc.cluster.local:80
    adminUser:
      name: grafana
      key: admin-user
    adminPassword:
      name: grafana
      key: admin-password
