# https://taskfile.dev

version: "3"

includes:
  tofu:
    taskfile: ./tofu/Taskfile.yml
    dir: .
  ansible:
    taskfile: ./ansible/Taskfile.yml
    dir: .
  kubernetes:
    taskfile: ./kubernetes/Taskfile.yml
    dir: .

tasks:
  # ---------------------------------------------------------------------------
  # ENVIRONMENT SETUP
  # ---------------------------------------------------------------------------

  env:init:
    desc: "Setup full development environment and Platform Tools"
    summary: |
      Bootstraps the control-plane code server with everything
      needed to manage remote infrastructure. This machine does NOT run
      workloads — it only runs commands against remote targets.

      Sub-tasks run idempotently (skip if already installed).
      Prerequisites: sudo access, internet connectivity, Task (pre-installed).
    cmds:
      - task: env:init:system
      - task: env:init:python
      - task: env:init:tofu
      - task: env:init:kubectl
      - task: env:init:helm
      - task: env:init:kubeseal
      - task: env:verify
      - echo ""
      - echo "👉 Activate the Python venv in your terminal:"
      - echo "   source .venv/bin/activate"

  # ---------------------------------------------------------------------------
  # ENV:INIT SUB-TASKS
  # ---------------------------------------------------------------------------


  env:init:system:
    desc: "Install system-level dependencies (python3-venv, python3-pip, sshpass, libguestfs-tools)"
    internal: true
    cmds:
      - |
        echo "Installing system dependencies..."
        sudo apt-get update -qq
        sudo apt-get install -y -qq python3-venv python3-pip sshpass libguestfs-tools
        echo "✅ System dependencies ready."

  env:init:tofu:
    desc: "Install OpenTofu via official apt repository"
    internal: true
    status:
      - command -v tofu
    cmds:
      - |
        echo "Installing OpenTofu..."
        sudo install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://get.opentofu.org/opentofu.gpg | sudo tee /etc/apt/keyrings/opentofu.gpg >/dev/null
        curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg 2>/dev/null
        sudo chmod a+r /etc/apt/keyrings/opentofu.gpg /etc/apt/keyrings/opentofu-repo.gpg
        echo "deb [signed-by=/etc/apt/keyrings/opentofu.gpg,/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" | sudo tee /etc/apt/sources.list.d/opentofu.list > /dev/null
        sudo apt-get update -qq
        sudo apt-get install -y -qq tofu
        echo "✅ OpenTofu installed."

  env:init:python:
    desc: "Create Python venv and install Ansible + tools"
    internal: true
    cmds:
      - |
        echo "Setting up Python virtual environment..."
        python3 -m venv .venv
        ./.venv/bin/pip install --upgrade pip --quiet
        ./.venv/bin/pip install -r requirements.txt --quiet
        echo "✅ Python venv ready at .venv/ (ansible $(. .venv/bin/activate && ansible --version | head -1))"

  env:init:kubectl:
    desc: "Install kubectl (latest stable)"
    internal: true
    status:
      - command -v kubectl
    cmds:
      - |
        echo "Installing kubectl..."
        KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
        curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
        sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
        rm -f kubectl
        echo "✅ kubectl ${KUBECTL_VERSION} installed."

  env:init:helm:
    desc: "Install Helm 3"
    internal: true
    status:
      - command -v helm
    cmds:
      - |
        echo "Installing Helm..."
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        echo "✅ Helm installed."


  env:init:kubeseal:
    desc: "Install kubeseal CLI for Sealed Secrets"
    internal: true
    status:
      - command -v kubeseal
    cmds:
      - |
        echo "Installing kubeseal..."
        KUBESEAL_VERSION=$(curl -s https://api.github.com/repos/bitnami/sealed-secrets/tags | grep '"name"' | head -1 | sed -E 's/.*"v([^"]+)".*/\1/')
        if [ -z "$KUBESEAL_VERSION" ]; then
          echo "Failed to fetch the latest kubeseal version"
          exit 1
        fi
        curl -fsSLO "https://github.com/bitnami/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz"
        tar -xzf "kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz" kubeseal
        sudo install -m 755 kubeseal /usr/local/bin/kubeseal
        rm -f kubeseal "kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz"
        echo "✅ kubeseal v${KUBESEAL_VERSION} installed."

  env:verify:
    desc: "Verify all platform tools are installed and accessible"
    cmds:
      - |
        echo ""
        echo "=============================================="
        echo "        Platform Tool Verification"
        echo "=============================================="
        FAIL=0
        # Function to print version cleanly
        print_version() {
          local cmd=$1
          local version=""
          case "$cmd" in
            tofu)
              version=$(tofu --version | head -n1 | awk '{print $NF}')
              ;;
            kubectl)
              version=$(kubectl version --client 2>/dev/null | head -n1 | awk '{print $NF}')
              ;;
            helm)
              version=$(helm version 2>/dev/null | grep -oE 'Version:"v[^"]+"' | head -n1 | cut -d'"' -f2)
              ;;
            virt-customize)
              version=$(virt-customize --version 2>/dev/null | awk '{print $2}')
              ;;
          esac
          printf "  ✅ %-15s %s\n" "$cmd" "$version"
        }

        for cmd in tofu kubectl helm kubeseal virt-customize; do
          if command -v "$cmd" > /dev/null 2>&1; then
            print_version "$cmd"
          else
            printf "  ❌ %-15s NOT FOUND\n" "$cmd"
            FAIL=1
          fi
        done
        # Check venv tools by file path (not PATH-dependent)
        for venv_cmd in ansible ansible-playbook ansible-vault ansible-lint; do
          if [ -f ".venv/bin/$venv_cmd" ]; then
            VERSION=$(.venv/bin/$venv_cmd --version 2>/dev/null | head -1)
            printf "  ✅ %-15s %s\n" "$venv_cmd" "$VERSION"
          else
            printf "  ❌ %-15s NOT FOUND\n" "$venv_cmd"
            FAIL=1
          fi
        done
        echo "=============================================="
        if [ "$FAIL" -eq 1 ]; then
          echo "  ⚠️  Some tools are missing. Run: task env:init"
          exit 1
        else
          echo "  🎉 All tools ready!"
        fi
        echo "=============================================="
        echo ""
        echo "  Activate the Python venv in your terminal:"
        echo "    source .venv/bin/activate"

  # ---------------------------------------------------------------------------
  # CORE WORKFLOWS
  # ---------------------------------------------------------------------------
  default:
    desc: "Lists all available tasks from all included files."
    silent: true
    cmds:
      - task --list-all

  git:clone-repository:
    desc: "Clone the github repository"
    cmds:
      - |
        echo "Clone the github repository..."
        git clone git@github.com:sinhaaritro/platform-stack.git
        echo "Moving to the folder"
        cd platform-stack/
        echo "Use other tasks like `task --list-all`"
    preconditions:
      - sh: "! command -v git"
        msg: "Git is already installed."

  git:pull-git-changes:
    desc: "Pull Latest Changes"
    cmds:
      - |
        cd ~/platform-stack/
        git pull
    preconditions:
      - sh: "! command -v git"
        msg: "Git is already installed."

  vm:build:
    desc: "Completely build VMs and provision with Ansible (Smart Wait)"
    cmds:
      - task: tofu:apply:approve
      - task: ansible:wait-ready
      - task: ansible:apply:all
