apiVersion: blueprints.goauthentik.io/v1
kind: Application
metadata:
  name: "immich"
spec:
  # The user-facing name of the application
  name: "Immich"
  # The unique identifier used internally
  slug: "immich"
  # This links the application to our OAuth provider
  provider: "immich-oauth-provider"
  # Enable OAuth2/OpenID Connect
  is_oauth2_provider: true
  # Public access (no authentication required for the application itself)
  # This is typical for OAuth providers - the provider handles auth
  access_policy: ""
  # Group binding - optional, can be used to restrict access
  # groups:
  #   - "family"
  # Meta labels for the application icon in Authentik UI
  meta:
    launch_url: "https://immich.yourdomain.com"
    # You can add an icon here if desired
    # icon: "camera"
