# ansible/ansible.cfg

# [defaults] Section
# This section defines the main default behaviors for Ansible.
[defaults]

# This is a huge quality-of-life improvement. By setting the default inventory
# path here, you will no longer need to type '-i ansible/inventory.yml'
# on the command line.
inventory = ../ansible/inventory.yml

# This is the primary fix for the "first-time connection" problem.
# It tells Ansible not to stop and prompt for confirmation.
host_key_checking = false

# This helps Ansible run more efficiently by not creating .retry files
# after failed playbook runs.
retry_files_enabled = false

# Tell Ansible exactly which Python interpreter to use by default.
interpreter_python = /usr/bin/python3

# PERFORMANCE: Parallel Execution
# Talk to N VMs simultaneously. Default is 5, which serialises large clusters.
# Set to the expected maximum number of VMs in the fleet.
forks = 20

# Hide skipped hosts on re-runs to keep console output readable.
display_skipped_hosts = False

# PERFORMANCE: Pipelining
# Instead of upload-via-SFTP → execute → delete for every task, pipe Python
# instructions directly over the open SSH connection. Cuts network operations
# by ~70 %. Requires 'Defaults requiretty' to be disabled in /etc/sudoers
# (already the default on modern Ubuntu/Debian).
pipelining = True

# PERFORMANCE: Fact Caching
# 'smart' = gather facts only when there is no valid cache entry.
# On re-runs against already-provisioned VMs this skips the 2-5 s
# "Gathering Facts" phase per host entirely.
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
# Cache TTL: 24 hours (86400 seconds). Facts are stable across daily runs.
fact_caching_timeout = 86400


# [ssh_connection] Section
# This section fine-tunes the behavior of SSH connections.
[ssh_connection]

# Merged SSH arguments (Ansible reads only one ssh_args line):
#   UserKnownHostsFile=/dev/null  — ignore & never save host keys (existing)
#   ControlMaster=auto            — reuse an existing multiplexed connection
#   ControlPersist=60s            — keep the tunnel open 60 s after last use,
#                                   so subsequent tasks reconnect instantly
ssh_args = -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s

# Use the faster native SSH mechanism for file transfers when available.
scp_if_ssh = smart