# defaults/main.yml
---
# Version to install (Must be exact version now, not 'latest')
helm_version: "v3.16.2"
_helm_version: "v{{ helm_version | regex_replace('^v', '') }}"

# Architecture Mapping
helm_arch_map:
  x86_64: "amd64"
  aarch64: "arm64"

# User for shell completion
helm_user: "{{ ansible_user }}"
