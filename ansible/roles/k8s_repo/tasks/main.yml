# tasks/main.yml
---
- name: Install APT transport dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - python3-debian
    state: present
    update_cache: true
  tags: [k8s, repo]

- name: Ensure APT keyring directory exists
  ansible.builtin.file:
    path: "{{ k8s_repo_k8s_keyring_dir }}"
    state: directory
    mode: '0755'
  tags: [k8s, repo]

- name: Download Kubernetes public signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ _k8s_repo_version }}/deb/Release.key"
    dest: "{{ k8s_repo_k8s_keyring_dir }}/{{ k8s_repo_k8s_keyring_file }}"
    mode: '0644'
    force: false # Only download if missing or URL changes
  tags: [k8s, repo]

- name: Add Kubernetes APT repository
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: [deb]
    uris: "https://pkgs.k8s.io/core:/stable:/{{ _k8s_repo_version }}/deb/"
    suites: ["/"]
    signed_by: "{{ k8s_repo_k8s_keyring_dir }}/{{ k8s_repo_k8s_keyring_file }}"
    state: present
  tags: [k8s, repo]
