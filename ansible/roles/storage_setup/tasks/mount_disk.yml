---
- name: Check disk device existence
  ansible.builtin.stat:
    path: "{{ mount_item.device }}"
  register: storage_setup_device_stat

- name: Get current filesystem type of device
  ansible.builtin.command: "blkid -s TYPE -o value {{ mount_item.device }}"
  register: storage_setup_current_fstype
  failed_when: false
  changed_when: false
  when: storage_setup_device_stat.stat.exists

- name: Unmount device if filesystem change is forced
  ansible.posix.mount:
    path: "{{ mount_item.path }}"
    state: unmounted
  when:
    - storage_setup_device_stat.stat.exists
    - mount_item.force | default(false) | bool
    - storage_setup_current_fstype.stdout != (mount_item.fstype | default('ext4'))

- name: Create filesystem on device
  community.general.filesystem:
    fstype: "{{ mount_item.fstype | default('ext4') }}"
    dev: "{{ mount_item.device }}"
    force: "{{ mount_item.force | default(omit) }}"
  when: storage_setup_device_stat.stat.exists

- name: Create mount point directory
  ansible.builtin.file:
    path: "{{ mount_item.path }}"
    state: directory
    mode: "0755"
  when: storage_setup_device_stat.stat.exists

- name: Mount device to path
  ansible.posix.mount:
    path: "{{ mount_item.path }}"
    src: "{{ mount_item.device }}"
    fstype: "{{ mount_item.fstype | default('ext4') }}"
    state: mounted
  when: storage_setup_device_stat.stat.exists
