# tasks/system.yml
---
- name: Disable Swap immediately
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: true

- name: Remove Swap from fstab (Persistence)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ k3s_kernel_modules }}"

- name: Persist kernel modules on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: Apply sysctl parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop: "{{ k3s_sysctl_params | dict2items }}"

- name: Create k3s-flannel-config systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s-flannel-config.service
    content: |
      [Unit]
      Description=K3s Flannel Config Workaround
      Before=k3s.service k3s-agent.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/mkdir -p /run/flannel
      ExecStart=/bin/sh -c 'if [ ! -f /run/flannel/subnet.env ]; then echo "FLANNEL_NETWORK={{ k3s_cluster_cidr }}\nFLANNEL_SUBNET={{ k3s_cluster_cidr | ipsubnet(24, 0) }}\nFLANNEL_MTU=1450\nFLANNEL_IPMASQ=true" > /run/flannel/subnet.env; fi'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  tags: [k3s, network]

- name: Enable k3s-flannel-config service on boot
  ansible.builtin.systemd:
    name: k3s-flannel-config
    enabled: true
  tags: [k3s, network]
