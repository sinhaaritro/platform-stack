# tasks/graceful-shutdown.yml
---
# 1. Ensure K3s config directory exists (required before deploying any config)
- name: Ensure K3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

# 2. Deploy kubelet configuration for graceful shutdown
- name: Deploy Kubelet Graceful Shutdown Configuration
  ansible.builtin.template:
    src: kubelet.config.j2
    dest: /etc/rancher/k3s/kubelet.config
    owner: root
    group: root
    mode: "0644"
  notify: Restart K3s

# 3. Ensure logind.conf.d directory exists
- name: Ensure logind.conf.d directory exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

# 4. Deploy logind inhibitor configuration
- name: Deploy systemd-logind Inhibitor Configuration
  ansible.builtin.template:
    src: logind-inhibit.conf.j2
    dest: /etc/systemd/logind.conf.d/99-kubelet-shutdown.conf
    owner: root
    group: root
    mode: "0644"
  # TODO: Remove register block when handler verification is completed
  # register: k3s_cluster_logind_config
  notify: Restart systemd-logind

# 6. Deploy K3s persistent configuration (for existing clusters)
- name: Deploy K3s persistent configuration
  ansible.builtin.template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0644"
  notify: Restart K3s
