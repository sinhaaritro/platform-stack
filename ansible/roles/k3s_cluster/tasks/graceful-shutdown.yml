# tasks/graceful-shutdown.yml
---
# 1. Deploy kubelet configuration for graceful shutdown
- name: Deploy Kubelet Graceful Shutdown Configuration
  ansible.builtin.template:
    src: kubelet.config.j2
    dest: /etc/rancher/k3s/kubelet.config
    owner: root
    group: root
    mode: "0644"
  notify: restart k3s

# 2. Ensure logind.conf.d directory exists
- name: Ensure logind.conf.d directory exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

# 3. Deploy logind inhibitor configuration
- name: Deploy systemd-logind Inhibitor Configuration
  ansible.builtin.template:
    src: logind-inhibit.conf.j2
    dest: /etc/systemd/logind.conf.d/99-kubelet-shutdown.conf
    owner: root
    group: root
    mode: "0644"
  register: logind_config

# 4. Restart logind to apply inhibitor settings
- name: Restart systemd-logind
  ansible.builtin.systemd:
    name: systemd-logind
    state: restarted
    daemon_reload: true
  when: logind_config.changed

# 5. Ensure kubelet-arg is in K3s persistent config (for existing clusters)
- name: Ensure K3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy K3s persistent configuration
  ansible.builtin.template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0644"
  notify: restart k3s
