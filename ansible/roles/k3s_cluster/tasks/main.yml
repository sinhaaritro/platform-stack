# tasks/main.yml
---
# 0. Discover Cluster Name (Dynamic resolution based on inventory group vs folder)
- name: "Identify candidate cluster names from Ansible groups"
  ansible.builtin.stat:
    path: "{{ role_path }}/../../../kubernetes/clusters/{{ item }}"
  loop: "{{ group_names }}"
  register: cluster_folder_stats
  delegate_to: localhost
  become: false

- name: "Set k3s_cluster_name based on existing folder discovery"
  ansible.builtin.set_fact:
    k3s_cluster_name: "{{ item.item }}"
  loop: "{{ cluster_folder_stats.results }}"
  when:
    - item.stat.exists
    - item.stat.isdir
    - k3s_cluster_name is not defined

- name: "Fallback to default cluster name if no matching folder found"
  ansible.builtin.set_fact:
    k3s_cluster_name: "k3s-default"
  when: k3s_cluster_name is not defined

- name: "Debug Discovered Cluster Name"
  ansible.builtin.debug:
    msg: "Targeting Cluster: {{ k3s_cluster_name }}"

# 1. Run Safety Checks first
- name: Execute Safety Checks
  ansible.builtin.include_tasks: safety_checks.yml

# 2. Configure Firewall
- name: Configure Kubernetes Firewall Rules
  ansible.builtin.include_tasks: firewall.yml

# 3. Configure Longhorn Dependencies
- name: Configure Longhorn Dependencies
  ansible.builtin.include_tasks: longhorn_deps.yml

# 3. Validate Bootstrap Node
- name: Fail if Bootstrap Node is undefined
  ansible.builtin.fail:
    msg: "Variable 'k3s_bootstrap_node' is missing for host {{ inventory_hostname }}."
  when: k3s_bootstrap_node | length == 0

# 4. Identify Role
- name: Check if I am the Bootstrap Node
  ansible.builtin.set_fact:
    is_bootstrap: "{{ inventory_hostname == k3s_bootstrap_node }}"

# 5. Execution
- name: Initialize Primary Control Plane
  ansible.builtin.include_tasks: init.yml
  when:
    - "'k_control' in group_names"
    - is_bootstrap

- name: Inject Sealed Secrets Master Key
  ansible.builtin.include_tasks: inject-sealed-secrets-key.yml
  when:
    - "'k_control' in group_names"
    - is_bootstrap

- name: Join Secondary Control Planes (HA)
  ansible.builtin.include_tasks: join_control.yml
  when:
    - "'k_control' in group_names"
    - not is_bootstrap

- name: Join Worker Nodes
  ansible.builtin.include_tasks: join_worker.yml
  when: "'k_worker' in group_names"

- name: Synchronize Kubeconfig to Local Machine
  ansible.builtin.include_tasks: sync-kubeconfig.yml
  when:
    - "'k_control' in group_names"
    - is_bootstrap
