# tasks/sync-kubeconfig.yml
---
- name: Fetch k3s.yaml from bootstrap node
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: remote_kubeconfig_b64
  delegate_to: "{{ k3s_bootstrap_node }}"
  run_once: true

- name: Prepare local kubeconfig sync directory
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.kube"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

- name: Sync and merge kubeconfig to local machine
  ansible.builtin.command:
    cmd: >
      python3 {{ role_path }}/scripts/sync_kubeconfig.py
      --cluster-name "{{ k3s_cluster_name }}"
      --master-ip "{{ hostvars[k3s_bootstrap_node].ansible_host }}"
      --base64-config "{{ remote_kubeconfig_b64.content }}"
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: true
