# tasks/inject-sealed-secrets-key.yml
---
# ---------------------------------------------------------------------------
# SEALED SECRETS MASTER KEY INJECTION
# ---------------------------------------------------------------------------
# This file resolves where the encrypted master key lives and applies it to
# the cluster. Resolution priority (highest to lowest):
#
#   1. Git variables (url + path + revision from inventory / tfvars)
#      → sparse-clones the repo to fetch only the one file.
#   2. Absolute path (e.g., from group_vars/ruth/vars.yml)
#      → used as-is.
#   3. Dynamic group_names search
#      → scans kubernetes/clusters/<group>/sealed-secrets/master.secret.yaml
#         for every Ansible group this host belongs to.
# ---------------------------------------------------------------------------

# ---- Initialize role-prefixed variables ------------------------------------
- name: "Initialize internal prefixed path variable"
  ansible.builtin.set_fact:
    k3s_cluster_sealed_secrets_master_key_path: "{{ sealed_secrets_master_key_path }}"
  when: sealed_secrets_master_key_path is defined

# ---- PRIORITY 1: git reference variables -----------------------------------
- name: "Check if the master key file exists locally"
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../{{ k3s_cluster_sealed_secrets_master_key_path }}"
  delegate_to: localhost
  become: false
  register: k3s_cluster_local_key_stat
  when:
    - k3s_cluster_sealed_secrets_master_key_path is defined
    - not (k3s_cluster_sealed_secrets_master_key_path | regex_search('^/'))

- name: "Use local master key file if present"
  ansible.builtin.set_fact:
    k3s_cluster_sealed_secrets_master_key_path: "{{ playbook_dir }}/../{{ k3s_cluster_sealed_secrets_master_key_path }}"
    k3s_cluster_skip_git_clone: true
  when:
    - k3s_cluster_local_key_stat.stat is defined
    - k3s_cluster_local_key_stat.stat.exists

- name: "Shallow-clone the repo to fetch the master key file"
  ansible.builtin.git:
    repo: "{{ sealed_secrets_master_key_url }}"
    dest: "/tmp/sealed-secrets-fetch-{{ inventory_hostname }}"
    version: "{{ omit if sealed_secrets_master_key_revision == 'HEAD' else sealed_secrets_master_key_revision }}"
    depth: 1
  delegate_to: localhost
  become: false
  when:
    - sealed_secrets_master_key_url is defined
    - k3s_cluster_sealed_secrets_master_key_path is defined
    - sealed_secrets_master_key_revision is defined
    - not (k3s_cluster_sealed_secrets_master_key_path | regex_search('^/'))
    - k3s_cluster_skip_git_clone is not defined or not k3s_cluster_skip_git_clone

- name: "Resolve absolute path from sparse clone"
  ansible.builtin.set_fact:
    k3s_cluster_sealed_secrets_master_key_path: "/tmp/sealed-secrets-fetch-{{ inventory_hostname }}/{{ k3s_cluster_sealed_secrets_master_key_path }}"
  when:
    - sealed_secrets_master_key_url is defined
    - k3s_cluster_sealed_secrets_master_key_path is defined
    - sealed_secrets_master_key_revision is defined
    - not (k3s_cluster_sealed_secrets_master_key_path | regex_search('^/'))
    - k3s_cluster_skip_git_clone is not defined or not k3s_cluster_skip_git_clone

# ---- PRIORITY 3: fallback – dynamic group_names search --------------------
- name: "Find candidate master key paths based on Ansible group names"
  ansible.builtin.set_fact:
    k3s_cluster_candidate_key_paths: "{{ k3s_cluster_candidate_key_paths | default([]) + sealed_secrets_master_key_candidate_paths }}"
  loop: "{{ group_names }}"
  when: k3s_cluster_sealed_secrets_master_key_path is not defined
  no_log: true

- name: "Check which candidate master key path exists"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ k3s_cluster_candidate_key_paths | default([]) }}"
  register: k3s_cluster_stat_key_paths
  when: k3s_cluster_sealed_secrets_master_key_path is not defined
  no_log: true

- name: "Set path to the valid Sealed Secrets Master Key (from dynamic search)"
  ansible.builtin.set_fact:
    k3s_cluster_sealed_secrets_master_key_path: "{{ item.stat.path }}"
  loop: "{{ k3s_cluster_stat_key_paths.results | default([]) }}"
  when:
    - k3s_cluster_sealed_secrets_master_key_path is not defined
    - item.stat.exists

# ---- Apply the key ---------------------------------------------------------
- name: "Decrypt the Ansible Vault-encrypted master key"
  ansible.builtin.shell: >
    ansible-vault view
    --vault-password-file <(echo "$ANSIBLE_VAULT_PASSWORD")
    {{ k3s_cluster_sealed_secrets_master_key_path }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    ANSIBLE_VAULT_PASSWORD: "{{ lookup('env', 'ANSIBLE_VAULT_PASSWORD') }}"
  register: k3s_cluster_decrypted_master_key
  changed_when: false
  no_log: true
  when:
    - not k3s_cluster_k3s_conf.stat.exists
    - k3s_cluster_sealed_secrets_master_key_path is defined

- name: "Write decrypted master key to remote temp file"
  ansible.builtin.copy:
    content: "{{ k3s_cluster_decrypted_master_key.stdout }}"
    dest: /tmp/sealed-secrets-master-key.yaml
    mode: "0600"
  no_log: true
  when:
    - not k3s_cluster_k3s_conf.stat.exists
    - k3s_cluster_decrypted_master_key is not skipped

- name: "Ensure the Sealed Secrets namespace exists"
  ansible.builtin.shell: >
    set -o pipefail &&
    kubectl create namespace security --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/{{ ansible_user }}/.kube/config
  when:
    - not k3s_cluster_k3s_conf.stat.exists
    - k3s_cluster_decrypted_master_key is not skipped
  changed_when: true

- name: "Inject Sealed Secrets Master Key"
  ansible.builtin.command: >
    kubectl apply -f /tmp/sealed-secrets-master-key.yaml
  environment:
    KUBECONFIG: /home/{{ ansible_user }}/.kube/config
  when:
    - not k3s_cluster_k3s_conf.stat.exists
    - k3s_cluster_decrypted_master_key is not skipped
  changed_when: true

- name: "Clean up decrypted master key from remote"
  ansible.builtin.file:
    path: /tmp/sealed-secrets-master-key.yaml
    state: absent
  when: k3s_cluster_decrypted_master_key is not skipped
