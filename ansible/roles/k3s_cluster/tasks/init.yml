# tasks/init.yml
---
- name: Check if K3s is already initialized
  ansible.builtin.stat:
    path: /etc/rancher/k3s/k3s.yaml
  register: k3s_conf

- name: Initialize K3s Server (Primary)
  ansible.builtin.shell: |
    /tmp/k3s-install.sh server \
      --cluster-cidr={{ k3s_cluster_cidr }} \
      --service-cidr={{ k3s_service_cidr }} \
      --disable=servicelb \
      --disable=traefik \
      {{ '--cluster-init' if groups['k_control'] | length > 1 else '' }} \
      --tls-san={{ k3s_control_plane_endpoint if k3s_control_plane_endpoint else ansible_default_ipv4.address }}
  when: not k3s_conf.stat.exists
  changed_when: true

- name: Fetch K3s Node Token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_b64

- name: Set K3s Node Token Fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_b64.content | b64decode | trim }}"

- name: Create .kube directory for dev user
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.kube
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy k3s.yaml to user home
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/{{ ansible_user }}/.kube/config
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Update local kubeconfig to use node IP (if not localhost)
  ansible.builtin.replace:
    path: /home/{{ ansible_user }}/.kube/config
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_default_ipv4.address }}:6443"
