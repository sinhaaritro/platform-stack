# tasks/main.yml
---
- name: Wait for Kubernetes API server to become responsive
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    delay: 3
    timeout: 180
  when: inventory_hostname == argocd_bootstrap_node

- name: Install System Dependencies
  ansible.builtin.include_tasks: dependencies.yml

- name: Recover from Bad State (if applicable)
  ansible.builtin.include_tasks: recovery.yml

- name: Install ArgoCD Infrastructure
  ansible.builtin.include_tasks: install.yml

- name: Verify Readiness and Get Secrets
  ansible.builtin.include_tasks: security.yml

- name: Inject Velero AWS Credentials from OpenTofu
  ansible.builtin.include_tasks: inject-velero-creds.yml

- name: Bootstrap GitOps (App of Apps)
  ansible.builtin.include_tasks: gitops.yml

- name: Register Managed Fleets
  ansible.builtin.include_tasks: register_clusters.yml
  when:
    - argocd_managed_fleets is defined
    - argocd_managed_fleets | length > 0
    - inventory_hostname == argocd_bootstrap_node
